{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-header bg-success text-white text-center py-4">
                <h4 class="card-title mb-0"><i class="fas fa-user-plus me-2"></i>Create Account</h4>
                <p class="mb-0">Join us today</p>
            </div>
            <div class="card-body p-5">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control" id="username" name="username" required 
                                       placeholder="Choose a username">
                            </div>
                        </div>
                        
                        <div class="col-md-6 mb-4">
                            <label for="email" class="form-label fw-semibold">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" class="form-control" id="email" name="email" required 
                                       placeholder="your@email.com">
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password" required 
                                       placeholder="Create password">
                            </div>
                        </div>
                        
                        <div class="col-md-6 mb-4">
                            <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required 
                                       placeholder="Confirm password">
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100 py-3 fw-semibold">
                        <i class="fas fa-user-plus me-2"></i> Create Account
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted">Already have an account? 
                        <a href="{{ url_for('login') }}" class="text-success fw-semibold">Sign in here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
